<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      href="./favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon/favicon.svg" />
    <link rel="shortcut icon" href="./favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./favicon/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="Gesture Lab" />
    <link rel="manifest" href="./favicon/site.webmanifest" />
    <link rel="stylesheet" href="./style.css" />
    <title>Touchless Particle Playground</title>
    <meta
      name="description"
      content="GestureLab is an interactive 3D particle experience powered by hand gestures using MediaPipe and Three.js. Control, scale, spin, and manipulate particles without touch."
    />
    <meta
      name="keywords"
      content="GestureLab, AI, hand gesture control, 3D particles, Three.js, MediaPipe Hands, gesture based interaction, touchless UI, web experiments"
    />
    <meta name="author" content="Krish Bharadwaj" />
  </head>
  <body>
    <div id="ui">
      <h2>Gesture Rules</h2>
      <p>🖐 <b>Open:</b> Move Shape</p>
      <p>🤏 <b>Pinch:</b> Scale Shape</p>
      <p>👌 <b>OK:</b> Change Color Theme</p>
      <p>🤘 <b>Rock:</b> Activate Spinning</p>
      <p>✊ <b>Fist:</b> Create Gravity Pull</p>
    </div>

    <div id="video-container">
      <video autoplay playsinline id="webcam"></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "three";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

      let Particle_Count = 20000; // Total particles
      let shapeIndex = 0; // Which shape is active
      let colorIndex = 0; // Active color palette
      let expansion = 1.0; // Spread distance
      let isVortex = false; // Rock gesture active
      let isFist = false; // Fist detected
      let lastGestureTime = 0; // Gesture cooldown
      let video = document.getElementById("webcam");

      const palettes = [
        [0x0066ff, 0x00ffff, 0xffffff], // Diamond
        [0x6ee7e7, 0xa78bfa, 0xf472b6], // Aurora
        [0xff3300, 0xff9900, 0xff0055], // Lava
        [0x3b82f6, 0x60a5fa, 0x93c5fd], // Neo Blue
        [0x10b981, 0x34d399, 0x6ee7b7], // Emerald Mist
        [0x7c3aed, 0xa78bfa, 0xc4b5fd], // Royal Purple
      ];

      // Three.js Setup
      let scene = new THREE.Scene();
      let camera = new THREE.PerspectiveCamera(
        65,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.z = 8;

      // WebGL renderer
      let renderer = new THREE.WebGLRenderer({ antialias: false });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Post Processing
      let composer = new EffectComposer(renderer);
      let renderPass = new RenderPass(scene, camera);
      composer.addPass(renderPass);

      // Makes particles glow i.e Bloom Effect
      let bloom = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.5, // strength
        0.4, // radius
        0.85 // threshold
      );
      composer.addPass(bloom);

      // Particles System
      let geometry = new THREE.BufferGeometry();
      let positions = new Float32Array(Particle_Count * 3);
      let targets = new Float32Array(Particle_Count * 3);
      let colors = new Float32Array(Particle_Count * 3);

      // Attach arrays to GPU memory
      // Here 3 means, how many numbers belong to ONE vertex
      geometry.setAttribute(
        "position",
        new THREE.BufferAttribute(positions, 3) // x,y,z
      );
      geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3)); // r,g,b

      // Defining particles material,size
      let material = new THREE.PointsMaterial({
        size: 0.035,
        vertexColors: true,
        blending: THREE.AdditiveBlending,
        transparent: true,
        depthWrite: false,
      });

      // Renders Particle_Count particles
      let points = new THREE.Points(geometry, material);
      scene.add(points);

      // Color Setter
      let setCol = (i, p) => {
        let c = new THREE.Color(p[Math.floor(Math.random() * p.length)]); // return rgb color in [1,0,1] like format
        colors[i * 3] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
      };

      // Target Setter
      let setT = (i, x, y, z) => {
        targets[i * 3] = x;
        targets[i * 3 + 1] = y;
        targets[i * 3 + 2] = z;
      };

      // Set Default Color
      for (let i = 0; i < Particle_Count; i++) {
        setCol(i, palettes[0]);
      }

      // 3D Shape Generator
      let shapeGens = [
        function Sphere() {
          for (let i = 0; i < Particle_Count; i++) {
            let phi = Math.acos(-1 + (2 * i) / Particle_Count);
            let theta = Math.sqrt(Particle_Count * Math.PI) * phi;
            setT(
              i,
              3 * Math.cos(theta) * Math.sin(phi),
              3 * Math.sin(theta) * Math.sin(phi),
              3 * Math.cos(phi)
            );
          }
        },
      ];

      // Mediapipe Hand Tracking
      let hands = new Hands({
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`,
      });
      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.75,
      });

      // Hand Results Callback
      hands.onResults((res) => {
        if (!res.multiHandLandmarks || res.multiHandLandmarks.length === 0)
          return;

        let lm = res.multiHandLandmarks[0];

        // Smooth positioning of shape based on hand movement, 9 indicates center of palm
        let targetX = (lm[9].x - 0.5) * -15;
        let targetY = (lm[9].y - 0.5) * -12;
        points.position.lerp(new THREE.Vector3(targetX, targetY, 0), 0.1);

        // Thumb–Index Distance, hypot calculates distance between two points
        let distThumbIndex = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);

        // Smooth Scaling
        expansion = THREE.MathUtils.lerp(expansion, distThumbIndex * 7, 0.1);

        // Fist Detection ✊
        isFist =
          lm[8].y > lm[6].y && lm[12].y > lm[10].y && lm[16].y > lm[14].y;

        // Vortex Detection 🤘
        isVortex =
          lm[8].y < lm[6].y && lm[20].y < lm[18].y && lm[12].y > lm[10].y;

        // Update Color 👌
        if (Date.now() - lastGestureTime > 1000) {
          console.log(lm[12].y, lm[10].y);
          if (distThumbIndex < 0.05 && lm[12].y < lm[10].y) {
            colorIndex = (colorIndex + 1) % palettes.length;
            for (let i = 0; i < Particle_Count; i++) {
              setCol(i, palettes[colorIndex]);
              geometry.attributes.color.needsUpdate = true;
              lastGestureTime = Date.now();
            }
          }
        }
      });

      let cam = new Camera(video, {
        // onFrame runs for every webcam frame
        onFrame: async () => {
          await hands.send({ image: video }); // sends current video frame to Mediapipe Hands
        },
        width: 640,
        height: 480,
      });
      cam.start();

      // Creates an infinite render loop
      function animate() {
        requestAnimationFrame(animate);
        shapeGens[shapeIndex]();

        let pArr = geometry.attributes.position.array;
        for (let i = 0; i < Particle_Count; i++) {
          let i3 = i * 3;
          let dynamicExp = isFist ? 0.3 : expansion;
          pArr[i3] += (targets[i3] * dynamicExp - pArr[i3]) * 0.07;
          pArr[i3 + 1] += (targets[i3 + 1] * dynamicExp - pArr[i3 + 1]) * 0.07;
          pArr[i3 + 2] += (targets[i3 + 2] * dynamicExp - pArr[i3 + 2]) * 0.07;
        }

        geometry.attributes.position.needsUpdate = true;

        // Rotate the shape
        if (isVortex) {
          points.rotation.y += 0.05;
          points.rotation.z += 0.1;
        } else {
          points.rotation.y += 0.005;
          points.rotation.z *= 0.9;
        }

        // Applies Bloom
        composer.render();
      }

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });

      animate();
    </script>
  </body>
</html>
